<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 Service Users | LandInfoTG</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:#f4f7fc;
margin:0;
color:#333;
}

header{
background:linear-gradient(90deg,#7A8450,#5f673d);
color:white;
text-align:center;
padding:18px;
font-size:24px;
font-weight:600;
}

.container{
max-width:1000px;
margin:30px auto;
background:white;
border-radius:15px;
padding:25px;
box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

.search-box{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
}

/* FILTER BUTTONS */
.filter-buttons{
margin-bottom:20px;
}

.filter-buttons button{
padding:8px 15px;
margin-right:8px;
border:none;
border-radius:20px;
cursor:pointer;
font-size:13px;
color:white;
}

.all-btn{background:#6c757d;}
.ec-btn{background:#17a2b8;}
.ror-btn{background:#6f42c1;}
.doc-btn{background:#fd7e14;}

.card{
background:#f9fbff;
border:1px solid #d9e6f2;
border-radius:10px;
padding:15px 20px;
margin-bottom:15px;
position:relative;
}

.service-badge{
padding:4px 10px;
border-radius:20px;
font-size:12px;
color:white;
margin-left:8px;
}

.ec-badge{background:#17a2b8;}
.ror-badge{background:#6f42c1;}
.doc-badge{background:#fd7e14;}

.delete-btn{
background:#ff4d4d;
color:white;
border:none;
border-radius:8px;
padding:6px 12px;
cursor:pointer;
position:absolute;
right:15px;
bottom:15px;
}

.whatsapp-btn{
display:inline-block;
background:#25D366;
color:white;
padding:6px 12px;
border-radius:8px;
font-size:12px;
text-decoration:none;
position:absolute;
right:15px;
top:15px;
}

footer{
text-align:center;
background:#7A8450;
color:white;
padding:10px;
margin-top:40px;
}
</style>
</head>
<body>

<header>📋 Service Users — LandInfoTG</header>

<div class="container">

<input type="text" id="searchBar" class="search-box"
placeholder="Search by name, phone, district...">

<div class="filter-buttons">
<button class="all-btn" onclick="filterService('All')">All</button>
<button class="ec-btn" onclick="filterService('EC')">EC</button>
<button class="ror-btn" onclick="filterService('ROR')">ROR</button>
<button class="doc-btn" onclick="filterService('Documents')">Documents</button>
</div>

<div id="list">Loading...</div>

</div>

<footer>© 2026 LandInfoTG</footer>

<script>

let allUsers=[];
let currentFilter="All";

const listDiv=document.getElementById("list");
const searchBar=document.getElementById("searchBar");

/* LOAD USERS */
function loadUsers(){
allUsers=JSON.parse(localStorage.getItem("users"))||[];
applyFilters();
}

/* FILTER BUTTON */
function filterService(type){
currentFilter=type;
applyFilters();
}

/* SEARCH */
searchBar.addEventListener("input",applyFilters);

function applyFilters(){

let text=searchBar.value.toLowerCase();

let filtered=allUsers.filter(u=>{

let serviceValue=(u.service || u.type || "EC").toLowerCase();
let filterValue=currentFilter.toLowerCase();

let matchSearch=
(u.name && u.name.toLowerCase().includes(text))||
(u.phone && u.phone.includes(text))||
(u.district && u.district.toLowerCase().includes(text));

let matchService=
filterValue==="all"||
serviceValue===filterValue.toLowerCase();

return matchSearch && matchService;
});

renderList(filtered);
}

/* RENDER */
function renderList(users){

listDiv.innerHTML="";

if(users.length===0){
listDiv.innerHTML="<p>No Users Found</p>";
return;
}

users.slice().reverse().forEach((data)=>{

let serviceValue=(data.service || data.type || "EC").toLowerCase();
let displayService=(data.service || data.type || "EC");

let badgeClass="ec-badge";
if(serviceValue==="ror") badgeClass="ror-badge";
if(serviceValue==="documents") badgeClass="doc-badge";

let serviceBadge=`
<span class="service-badge ${badgeClass}">
${displayService}
</span>`;

let originalIndex=allUsers.indexOf(data);

listDiv.innerHTML+=`
<div class="card">

<h3>${data.name||'-'} (${data.phone||'-'}) ${serviceBadge}</h3>

<p><b>District:</b> ${data.district||'-'}</p>
<p><b>Survey:</b> ${data.survey||'-'}</p>
<p><b>Khata:</b> ${data.khata||'-'}</p>
<p><b>Date:</b> ${data.date||'-'}</p>

<a href="https://wa.me/91${data.phone}?text=Hello%20${data.name},%20your%20${displayService}%20request%20is%20received."
class="whatsapp-btn" target="_blank">
WhatsApp
</a>

<button class="delete-btn"
onclick="deleteUser(${originalIndex})">
Delete
</button>

</div>
`;

});
}

/* DELETE */
function deleteUser(index){
if(confirm("Delete this record?")){
allUsers.splice(index,1);
localStorage.setItem("users",JSON.stringify(allUsers));
applyFilters();
}
}

loadUsers();

</script>

</body>
</html>
